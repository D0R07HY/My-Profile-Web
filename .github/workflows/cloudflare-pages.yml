name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build static site
        shell: pwsh
        run: ./scripts/build-pages.ps1

      - name: Validate Cloudflare config
        shell: pwsh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          $ErrorActionPreference = "Stop"

          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:CLOUDFLARE_ACCOUNT_ID)) { $missing += "CLOUDFLARE_ACCOUNT_ID" }
          if ([string]::IsNullOrWhiteSpace($env:CLOUDFLARE_API_TOKEN)) { $missing += "CLOUDFLARE_API_TOKEN" }
          if ([string]::IsNullOrWhiteSpace($env:CLOUDFLARE_PAGES_PROJECT_NAME)) { $missing += "CLOUDFLARE_PAGES_PROJECT_NAME" }

          if ($missing.Count -gt 0) {
            throw "Missing required GitHub secret(s): $($missing -join ', ')."
          }

          Write-Host "Cloudflare config present."
          Write-Host "Account ID length: $($env:CLOUDFLARE_ACCOUNT_ID.Length)"
          Write-Host "Pages project: $env:CLOUDFLARE_PAGES_PROJECT_NAME"

          $headers = @{
            Authorization = "Bearer $env:CLOUDFLARE_API_TOKEN"
            'Content-Type' = 'application/json'
          }

          $tokenCheck = Invoke-WebRequest -UseBasicParsing -Uri "https://api.cloudflare.com/client/v4/accounts/$($env:CLOUDFLARE_ACCOUNT_ID)/tokens/verify" -Headers $headers -Method Get -ErrorAction Stop
          $tokenData = $tokenCheck.Content | ConvertFrom-Json
          if (-not $tokenData.success) {
            $errors = ($tokenData.errors | ForEach-Object { $_.message }) -join '; '
            throw "CLOUDFLARE_API_TOKEN verification failed: $errors"
          }

          Write-Host "Cloudflare API token verified."

          $projectUrl = "https://api.cloudflare.com/client/v4/accounts/$($env:CLOUDFLARE_ACCOUNT_ID)/pages/projects/$($env:CLOUDFLARE_PAGES_PROJECT_NAME)"
          $response = Invoke-WebRequest -UseBasicParsing -Uri $projectUrl -Headers $headers -Method Get -ErrorAction Stop
          $data = $response.Content | ConvertFrom-Json

          if (-not $data.success) {
            $errors = ($data.errors | ForEach-Object { $_.message }) -join '; '
            throw "Cloudflare Pages project check failed: $errors"
          }

          Write-Host "Cloudflare Pages project check passed."

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
